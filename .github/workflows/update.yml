name: Daily Coupon Data

on:
  schedule:
    - cron: '45 15 * * *'   # 每天 UTC 15:45 (北京时间 23:45)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install rich

      - name: Fetch latest data
        run: python coupons.py --refresh --yes
        env:
          PYTHONIOENCODING: utf-8

      - name: Export CSV
        run: python coupons.py --export data.csv --yes
        env:
          PYTHONIOENCODING: utf-8

      - name: Save diff history
        run: python coupons.py --diff --yes
        env:
          PYTHONIOENCODING: utf-8

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_data.json .coupon_history.json data.csv
          git diff --staged --quiet || git commit -m "chore: daily coupon data update"
          git push

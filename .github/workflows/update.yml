name: Daily Coupon Data

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00 (北京时间 10:00)
  workflow_dispatch:      # 支持手动触发

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install rich

      - name: Fetch and save latest data
        run: python coupons.py --refresh --diff
        env:
          PYTHONIOENCODING: utf-8

      - name: Export CSV
        run: python coupons.py --refresh --export data.csv
        env:
          PYTHONIOENCODING: utf-8

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_data.json .coupon_history.json data.csv
          git diff --staged --quiet || git commit -m "chore: daily coupon data update"
          git push
